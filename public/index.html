<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok Live Downloader</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="background-elements">
    <div class="blob blob-cyan"></div>
    <div class="blob blob-pink"></div>
  </div>

  <main class="container">
    <header class="header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/-logo" viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="url(#gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00f2fe" />
              <stop offset="100%" stop-color="#fe0979" />
            </linearGradient>
          </defs>
          <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path>
        </svg>
        <h1>Live Downloader</h1>
      </div>
      <p class="subtitle">Download TikTok Live Streams instantly</p>
    </header>

    <div class="card">
      <form id="downloadForm">
        <div class="input-group">
          <label for="url">Stream URL or Username</label>
          <input type="text" id="url" placeholder="https://vt.tiktok.com/... or @username" required>
        </div>
        
        <div class="input-group">
          <label for="format">Video Format</label>
          <div class="custom-select">
            <select id="format">
              <option value="mp4">MP4 (Standard)</option>
              <option value="mkv">MKV (Best for interrupted streams)</option>
            </select>
          </div>
        </div>

        <button type="submit" id="downloadBtn" class="btn-primary">
          <span class="btn-text">Start Download</span>
          <svg class="loader-icon" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>
        </button>
      </form>
    </div>

    <div id="statusCard" class="card status-card" style="display: none;">
      <div class="status-header">
        <h3 id="statusTitle">Connecting...</h3>
        <div style="display: flex; align-items: center; gap: 0.5rem;">
          <span id="recIndicator" class="rec-indicator" style="display: none;">
            <span class="rec-dot"></span>
            REC
          </span>
          <span id="statusBadge" class="badge">Processing</span>
        </div>
      </div>
      
      <div id="videoContainer" class="video-container">
        <video id="previewVideo" autoplay muted controls></video>
      </div>

      <div class="progress-container">
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <div class="progress-stats">
          <span id="progressSize">0 MB</span>
          <span id="progressTime">00:00:00</span>
        </div>
      </div>
      
      <div class="console-output">
        <pre id="consoleLog">System Log Ready.</pre>
      </div>

      <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
        <button id="saveFileBtn" class="btn-primary" style="display: none; margin-bottom: 1rem; flex: 1; background: linear-gradient(135deg, #10b981, #059669);">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
          Open Local Folder
        </button>

        <button id="downloadFileBtn" class="btn-primary" style="display: none; margin-bottom: 1rem; flex: 1; background: linear-gradient(135deg, #3b82f6, #2563eb);">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          Download MP4
        </button>
      </div>

      <button id="recordNewBtn" class="btn-primary" style="display: none; margin-bottom: 1rem;">
        Record Another Live
      </button>

      <button id="stopBtn" class="btn-secondary">Stop Download</button>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
  <script src="app.js?v=6"></script>
</body>
</html>
